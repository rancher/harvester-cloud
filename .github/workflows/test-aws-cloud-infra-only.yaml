name: Test AWS VM deploy and destroy

on:
  workflow_dispatch:

jobs:
  aws_vm_terraform_deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 
      - name: Ensure netcat is installed
        run: sudo apt-get update && sudo apt-get install -y netcat-openbsd
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.10.5"
      - name: Authenticate to AWS Cloud
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4 
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Initialize Terraform
        run: terraform init
        working-directory: tests/aws/infra-only
      - name: Run Terraform apply
        run: terraform apply -auto-approve
        working-directory: tests/aws/infra-only
      - name: Get public IP from Terraform output
        id: ip
        run: |
          ip=$(terraform output -json first_instance_public_ip | jq -r '.')
          echo "INSTANCE_IP=$ip" >> $GITHUB_ENV
        working-directory: tests/aws/infra-only
      - name: Wait for SSH (port 22) to become available
        run: |
          echo "Waiting for port 22 on $INSTANCE_IP..."
          for i in {1..30}; do
            if nc -zv $INSTANCE_IP 22; then
              echo "Port 22 is open."
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "SSH not available after 30 attempts. Failing."
          exit 1
        env:
          INSTANCE_IP: ${{ env.INSTANCE_IP }}
      - name: Run Terraform Destroy
        if: always()
        run: terraform destroy -auto-approve
        working-directory: tests/aws/infra-only
