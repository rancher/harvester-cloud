name: Test DigitalOcean VM deploy and destroy

on:
  workflow_dispatch:

jobs:
  do_vm_terraform_deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Ensure netcat is installed
        run: sudo apt-get update && sudo apt-get install -y netcat-openbsd
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.14.6"
      - name: Get public IP from the GitHub Runner (security purpose)
        id: get_ip
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          echo "Detected GitHub Runner IP: $RUNNER_IP"
      - name: Initialize Terraform
        run: terraform init
        working-directory: tests/digitalocean/infra-only
      - name: Run Terraform apply
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        run: terraform apply -var "do_token=$DIGITALOCEAN_TOKEN" -var "public_ip_source_addresses=[\"$RUNNER_IP/32\"]" -auto-approve
        working-directory: tests/digitalocean/infra-only
      - name: Get public IP from Terraform output
        id: ip
        run: |
          ip=$(terraform output -json first_instance_public_ip | jq -r '.[0]')
          echo "INSTANCE_IP=$ip" >> $GITHUB_ENV
        working-directory: tests/digitalocean/infra-only
      - name: Wait for SSH (port 22) to become available
        run: |
          echo "Waiting for port 22 on $INSTANCE_IP..."
          for i in {1..30}; do
            if nc -zv $INSTANCE_IP 22; then
              echo "Port 22 is open."
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "SSH not available after 30 attempts. Failing."
          exit 1
        env:
          INSTANCE_IP: ${{ env.INSTANCE_IP }}
      - name: Run Terraform Destroy
        if: always()
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        run: terraform destroy -var "do_token=$DIGITALOCEAN_TOKEN" -var "public_ip_source_addresses=[\"$RUNNER_IP/32\"]" -auto-approve
        working-directory: tests/digitalocean/infra-only
