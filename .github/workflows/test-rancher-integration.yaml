name: Rancher integration testing on Google Cloud infrastructure

on:
  workflow_dispatch:

jobs:
  rancher_harvester_ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Clone tf-rancher-up project
        run: git clone https://github.com/rancher/tf-rancher-up.git tf-rancher-up
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.10.5"
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
      - name: Initialize Terraform (Rancher - tf-rancher-up project)
        run: terraform init
        working-directory: tf-rancher-up/recipes/upstream/google-cloud/rke2
      - name: Run Terraform apply (Rancher - tf-rancher-up project)
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          RANCHER_PASSWORD: ${{ secrets.RANCHER_PASSWORD }}
        run: |
          terraform apply -auto-approve \
            -var "prefix=rancher-harv-integration-wf" \
            -var "project_id=$PROJECT_ID" \
            -var "rancher_password=$RANCHER_PASSWORD"
        working-directory: tf-rancher-up/recipes/upstream/google-cloud/rke2
      - name: Get Rancher endpoint from Terraform output
        id: rancher_out
        run: |
          url=$(terraform output -raw rancher_url)
          echo "RANCHER_URL=$url" >> $GITHUB_ENV
        working-directory: tf-rancher-up/recipes/upstream/google-cloud/rke2
      - name: Wait for Rancher API
        env:      
          RANCHER_URL: ${{ env.RANCHER_URL }}
        run: |
          python3 -u <<'EOF'
          import os
          import requests
          import time
          import sys

          RANCHER_URL = os.environ['RANCHER_URL']

          print("Waiting Rancher API...")

          for i in range(1, 51):
              try:
                  response = requests.get(
                      f"{RANCHER_URL}/ping",
                      timeout=5,
                      verify=True
                  )
                  if response.status_code == 200:
                      print("Rancher ready!")
                      sys.exit(0)
              except requests.exceptions.RequestException:
                  pass

              print(f"Attempt {i} failed, retrying in 10s...")
              time.sleep(10)

          print("Rancher not ready!")
          sys.exit(1)
          EOF
      - name: Create Rancher API token via Python
        env:
          RANCHER_URL: ${{ env.RANCHER_URL }}
          RANCHER_PASSWORD: ${{ secrets.RANCHER_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import os
          import requests

          RANCHER_URL = os.environ['RANCHER_URL']
          RANCHER_PASSWORD = os.environ['RANCHER_PASSWORD']
          GITHUB_ENV = os.environ.get('GITHUB_ENV', '/tmp/github_env')

          try:
              login_resp = requests.post(
                  f"{RANCHER_URL}/v3-public/localProviders/local?action=login",
                  json={"username": "admin", "password": RANCHER_PASSWORD},
                  headers={"Content-Type": "application/json"},
                  verify=True
              )
              login_resp.raise_for_status()
              TOKEN = login_resp.json()['token']

              api_resp = requests.post(
                  f"{RANCHER_URL}/v3/token",
                  json={"type": "apiKey", "description": "ci token"},
                  headers={
                      "Content-Type": "application/json",
                      "Authorization": f"Bearer {TOKEN}"
                  },
                  verify=True
              )
              api_resp.raise_for_status()
              FULL_TOKEN = api_resp.json()['token']

              ACCESS_KEY, SECRET_KEY = FULL_TOKEN.split(":")

              print(f"::add-mask::{TOKEN}")
              print(f"::add-mask::{FULL_TOKEN}")
              print(f"::add-mask::{ACCESS_KEY}")
              print(f"::add-mask::{SECRET_KEY}")

              with open(GITHUB_ENV, "a") as f:
                  f.write(f"RANCHER_CI_TOKEN_ACCESS_KEY={ACCESS_KEY}\n")
                  f.write(f"RANCHER_CI_TOKEN_SECRET_KEY={SECRET_KEY}\n")

              print("Rancher API token created successfully.")
              print("Error creating Rancher API token:", e)
              exit(1)
          EOF
      - name: Initialize Terraform (Harvester)
        run: terraform init
        working-directory: projects/google-cloud
      - name: Run Terraform apply (Harvester)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          RANCHER_URL: ${{ env.RANCHER_URL }}
          RANCHER_CI_TOKEN_ACCESS_KEY: ${{ env.RANCHER_CI_TOKEN_ACCESS_KEY }}
          RANCHER_CI_TOKEN_SECRET_KEY: ${{ env.RANCHER_CI_TOKEN_SECRET_KEY }}
        run: |
          terraform apply -auto-approve \
            -var "prefix=harv-rancher-integration-wf" \
            -var "project_id=$GCP_PROJECT_ID" \
            -var "rancher_api_url=$RANCHER_URL" \
            -var "rancher_access_key=$RANCHER_CI_TOKEN_ACCESS_KEY" \
            -var "rancher_secret_key=$RANCHER_CI_TOKEN_SECRET_KEY" \
            -var "rancher_insecure=true"
        working-directory: projects/google-cloud
      - name: Get public IP from Terraform output
        id: ip
        run: |
          ip=$(terraform output -json first_instance_public_ip | jq -r '.[0]')
          echo "INSTANCE_IP=$ip" >> $GITHUB_ENV
        working-directory: projects/google-cloud
      - name: Wait for SSH (port 22) to become available
        run: |
          echo "Waiting for port 22 on $INSTANCE_IP..."
          for i in {1..30}; do
            if nc -zv $INSTANCE_IP 22; then
              echo "Port 22 is open."
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "SSH not available after 30 attempts. Failing."
          exit 1
        env:
          INSTANCE_IP: ${{ env.INSTANCE_IP }}
      - name: Validate Harvester-Rancher integration
        env:
          RANCHER_URL: ${{ env.RANCHER_URL }}
          RANCHER_CI_TOKEN_ACCESS_KEY: ${{ env.RANCHER_CI_TOKEN_ACCESS_KEY }}
          RANCHER_CI_TOKEN_SECRET_KEY: ${{ env.RANCHER_CI_TOKEN_SECRET_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          import requests
          import sys

          RANCHER_URL = os.environ['RANCHER_URL']
          ACCESS_KEY = os.environ['RANCHER_CI_TOKEN_ACCESS_KEY']
          SECRET_KEY = os.environ['RANCHER_CI_TOKEN_SECRET_KEY']

          try:
              print("Checking Harvester integration with Rancher...")

              response = requests.get(
                  f"{RANCHER_URL}/v3/clusters",
                  auth=(ACCESS_KEY, SECRET_KEY),
                  verify=True
              )
              response.raise_for_status()
              data = response.json().get('data', [])

              cluster_count = len(data)
              if cluster_count > 0:
                  print("Harvester successfully registered with Rancher.")
                  print(f"Found {cluster_count} cluster(s):")
                  for cluster in data:
                      print(f"- {cluster['name']} (ID: {cluster['id']})")
              else:
                  print("No clusters found, Harvester integration may have failed.")
                  sys.exit(1)

              print("Error checking clusters:", e)
              sys.exit(1)
          EOF
      - name: Wait/Verify before destroy
        run: |
          sleep 60s
      - name: Run Terraform Destroy (Harvester)
        if: always()
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          terraform destroy -auto-approve \
            -var "prefix=harv-rancher-integration-wf" \
            -var "project_id=$GCP_PROJECT_ID" \
            -var "rancher_api_url=$RANCHER_URL" \
            -var "rancher_access_key=$RANCHER_CI_TOKEN_ACCESS_KEY" \
            -var "rancher_secret_key=$RANCHER_CI_TOKEN_SECRET_KEY" \
            -var "rancher_insecure=true"
        working-directory: projects/google-cloud
      - name: Terraform destroy (Rancher)
        if: always()
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          RANCHER_PASSWORD: ${{ secrets.RANCHER_PASSWORD }}
        run: |
          terraform destroy -auto-approve \
            -var "prefix=rancher-harv-integration-wf" \
            -var "project_id=$PROJECT_ID" \
            -var "rancher_password=$RANCHER_PASSWORD"
        working-directory: tf-rancher-up/recipes/upstream/google-cloud/rke2
